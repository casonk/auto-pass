<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto-pass{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { font-size: .9rem; }
    .nav-link.active { font-weight: 600; }
    .badge-locked { background: #dc3545; }
    .badge-unlocked { background: #198754; }
    .mono { font-family: monospace; font-size: .85rem; }
    .entry-path { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark border-bottom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🔑 auto-pass</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if active=='audit' %}active{% endif %}" href="/">Audit Log</a></li>
        <li class="nav-item"><a class="nav-link {% if active=='allowlist' %}active{% endif %}" href="/allowlist">Allowlist</a></li>
        <li class="nav-item"><a class="nav-link {% if active=='entries' %}active{% endif %}" href="/entries">Entries</a></li>
        <li class="nav-item"><a class="nav-link {% if active=='daemon' %}active{% endif %}" href="/daemon">Daemon</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        {% if daemon %}
          {% if daemon.running and not daemon.locked %}
            <span class="badge badge-unlocked">unlocked</span>
          {% elif daemon.running %}
            <span class="badge badge-locked">locked</span>
          {% else %}
            <span class="badge bg-secondary">offline</span>
          {% endif %}
        {% endif %}
        <a class="btn btn-sm btn-outline-secondary" href="/logout">logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="container-fluid">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
