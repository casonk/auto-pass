<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto-pass — login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card" style="width:360px">
  <div class="card-body p-4">
    <h5 class="card-title mb-4">🔑 auto-pass</h5>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label">Access token</label>
        <input type="password" name="token" class="form-control" autofocus required>
        <div class="form-text">Set via AUTO_PASS_WEB_TOKEN in auto-pass.env.local</div>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
