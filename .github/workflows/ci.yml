name: CI

on: [push, pull_request]

jobs:
  tests:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black==26.1.0 ruff==0.15.9
          pip install pytest
          pip install git+https://github.com/casonk/dyno-lab.git
      - name: Check formatting (ruff format)
        run: ruff format --check .
      # TODO: remove black once ruff format is confirmed stable portfolio-wide
      - name: Check formatting (black — deprecated)
        run: black --check --diff .
      - name: Smoke test CLI
        run: PYTHONPATH=src python -m auto_pass --help
      - name: Run unit tests
        run: pytest -q
